<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Big Brother — League Standings</title>
<style>
  :root {
    --sheet-pale: #E7EFF7;
    --sheet-mid:  #CFE2F3;
    --sheet-blue: #9FC5E8;
    --blue-deep:  #3d6c99;
    --blue-ink:   #1c3a57;
    --bg: #f4f8fc;
    --panel: #ffffff;
    --ink: #14212e;
    --dim: #5f7286;
    --line: #d3e1ef;
    --gold: #d9a441;
    --pos: #2e8b57;
    --neg: #c0392b;
    --mono: 'SFMono-Regular', ui-monospace, 'Menlo', 'Consolas', monospace;
    --disp: 'Archivo Black', 'Arial Black', system-ui, sans-serif;
    --body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 12% -8%, rgba(159,197,232,.35), transparent 42%),
      radial-gradient(circle at 92% -4%, rgba(207,226,243,.5), transparent 38%),
      var(--bg);
    color: var(--ink); font-family: var(--body); line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 18px 80px; }
  header { display: flex; align-items: center; gap: 14px; padding: 6px 0 20px; }
  .eye { width: 40px; height: 40px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, var(--sheet-blue) 0 30%, var(--blue-deep) 31% 55%, var(--sheet-mid) 56%);
    border: 2px solid var(--sheet-blue); flex-shrink: 0; position: relative; }
  .eye::after { content:''; position:absolute; inset:0; margin:auto; width:10px; height:10px; background:var(--blue-ink); border-radius:50%; }
  .brand h1 { font-family: var(--disp); font-size: 19px; letter-spacing: -.3px; line-height: 1.05; text-transform: uppercase; color: var(--blue-ink); }
  .brand .tag { font-size: 12px; color: var(--blue-deep); letter-spacing: 2px; text-transform: uppercase; }
  .live-dot { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); font-family: var(--mono); }
  .live-dot i { width: 8px; height: 8px; border-radius: 50%; background: var(--blue-deep); box-shadow: 0 0 0 0 rgba(61,108,153,.5); animation: pulse 2.2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(61,108,153,.5)} 70%{box-shadow:0 0 0 7px rgba(61,108,153,0)} 100%{box-shadow:0 0 0 0 rgba(61,108,153,0)} }
  .bar { height: 3px; background: linear-gradient(90deg, var(--sheet-blue), var(--sheet-mid) 60%, transparent); border-radius: 3px; margin-bottom: 22px; }
  .picker-label { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--blue-deep); margin-bottom: 10px; }
  .leagues { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 12px; }
  .league-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px 16px 22px; cursor: pointer; text-align: left; color: var(--ink);
    transition: border-color .15s, transform .12s, box-shadow .15s; position: relative; overflow: hidden; box-shadow: 0 1px 2px rgba(28,58,87,.04); }
  .league-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--sheet-blue); }
  .league-card:hover { border-color: var(--sheet-blue); transform: translateY(-2px); box-shadow: 0 8px 22px rgba(61,108,153,.14); }
  .league-card .season { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--blue-deep); text-transform: uppercase; }
  .league-card .lname { font-family: var(--disp); font-size: 17px; margin: 4px 0 2px; text-transform: uppercase; letter-spacing: -.2px; color: var(--blue-ink); }
  .league-card .meta { font-size: 12px; color: var(--dim); }
  .league-card.pending::before { background: var(--gold); }
  .league-card.pending .meta { color: var(--gold); }
  .back { background: none; border: none; color: var(--blue-deep); font-family: var(--mono); font-size: 12px; cursor: pointer; padding: 4px 0; margin-bottom: 14px; letter-spacing: 1px; }
  .back:hover { text-decoration: underline; }
  .lead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .lead h2 { font-family: var(--disp); font-size: 26px; text-transform: uppercase; letter-spacing: -.5px; color: var(--blue-ink); }
  .lead .season { font-family: var(--mono); font-size: 12px; color: var(--blue-deep); letter-spacing: 1.5px; }
  .subline { color: var(--dim); font-size: 13px; margin-bottom: 22px; }
  .rank { display: grid; grid-template-columns: 46px 1fr auto; align-items: center; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(28,58,87,.04); }
  .rank.first { border-color: var(--sheet-blue); background: linear-gradient(90deg, var(--sheet-pale), var(--panel) 55%); }
  .pos { font-family: var(--disp); font-size: 22px; color: var(--sheet-blue); text-align: center; }
  .rank.first .pos { color: var(--gold); }
  .who .aname { font-family: var(--disp); font-size: 16px; text-transform: uppercase; letter-spacing: -.2px; color: var(--blue-ink); }
  .who .owner { font-size: 12px; color: var(--dim); }
  .score { text-align: right; }
  .score .pts { font-family: var(--disp); font-size: 24px; letter-spacing: -.5px; }
  .score .lbl { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .pos-pts { color: var(--pos); } .neg-pts { color: var(--neg); } .zero-pts { color: var(--dim); }
  .expand-hint { font-family: var(--mono); font-size: 10px; color: var(--blue-deep); letter-spacing: 1px; text-transform: uppercase; grid-column: 1/-1; margin-top: 8px; cursor: pointer; user-select: none; }
  .expand-hint:hover { text-decoration: underline; }
  .toggle-hg { grid-column: 1 / -1; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); display: none; }
  .rank.open .toggle-hg { display: block; }
  .hg-row { display: flex; justify-content: space-between; padding: 5px 2px; font-size: 13px; border-bottom: 1px solid var(--sheet-pale); }
  .hg-row:last-child { border: none; }
  .hg-row .v { font-family: var(--mono); }
  .state { text-align: center; padding: 60px 20px; color: var(--dim); }
  .state .big { font-family: var(--disp); font-size: 20px; color: var(--blue-ink); text-transform: uppercase; margin-bottom: 8px; }
  .spinner-eye { width: 46px; height: 46px; margin: 0 auto 18px; border-radius: 50%; background: conic-gradient(var(--sheet-blue), transparent 70%); animation: spin 1s linear infinite; -webkit-mask: radial-gradient(circle 15px, transparent 98%, #000); mask: radial-gradient(circle 15px, transparent 98%, #000); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-box { background: #fdf0ee; border: 1px solid #f2c4bd; border-radius: 10px; padding: 16px; color: #93342a; font-size: 14px; text-align: left; }
  .err-box code { font-family: var(--mono); background: #fff; padding: 1px 5px; border-radius: 4px; }
  .pending-note { background: var(--sheet-pale); border: 1px dashed var(--sheet-blue); border-radius: 10px; padding: 14px 16px; color: var(--blue-deep); font-size: 14px; }
  .updated { font-family: var(--mono); font-size: 11px; color: var(--dim); text-align: center; margin-top: 30px; letter-spacing: 1px; }
  @media (max-width: 520px) { .lead h2 { font-size: 21px; } .score .pts { font-size: 20px; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eye" aria-hidden="true"></div>
    <div class="brand"><h1>Fantasy Big Brother</h1><div class="tag">League Standings</div></div>
    <span class="live-dot"><i></i> Live from the house</span>
  </header>
  <div class="bar"></div>
  <div id="view"><div class="state"><div class="spinner-eye"></div>Tapping the feeds…</div></div>
  <div class="updated" id="updated"></div>
</div>

<script>
/* ============================================================
   CONFIG — paste your published Google Sheet CSV links here.
   Google Sheets → File → Share → Publish to web → pick tab → CSV.
   Leave null to run in DEMO mode with your real league data below.
   ============================================================ */
const CONFIG = {
  POINTS_CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmeNfSxrkM2Z7jZNGN5q_KP0zPQlqpITTJPWOSLMfql7t3QE7bN7eFD3yvBO-g76yzTV5JCWf1GIE9/pub?gid=989932838&single=true&output=csv",   // SeasonPoints tab: Houseguest | Value | Description
  LEAGUES_CSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRmeNfSxrkM2Z7jZNGN5q_KP0zPQlqpITTJPWOSLMfql7t3QE7bN7eFD3yvBO-g76yzTV5JCWf1GIE9/pub?gid=1715763591&single=true&output=csv"   // Leagues tab: League | Season | Alliance | Owner | Houseguest
};
  
/* ---------- DEMO DATA (all six of your league workbooks) ---------- */
const DEMO = {"points":[{"houseguest":"Dee","value":10,"desc":"Won HOH Week 1"},{"houseguest":"Rick","value":-2,"desc":"Was a Have Not Week 1"},{"houseguest":"Chuk","value":-2,"desc":"Was a Have Not Week 1"},{"houseguest":"Haley","value":-2,"desc":"Was a Have Not Week 1"},{"houseguest":"Taylor","value":-2,"desc":"Was a Have Not Week 1"},{"houseguest":"Drew","value":-2,"desc":"Was a Have Not Week 1"},{"houseguest":"Mallory","value":-2,"desc":"Was an Initial Nominee Week 1"},{"houseguest":"Yash","value":-2,"desc":"Was an Initial Nominee Week 1"},{"houseguest":"Taylor","value":-2,"desc":"Was an Initial Nominee Week 1"},{"houseguest":"Mallory","value":6,"desc":"Won the Power of Veto Week 1"},{"houseguest":"Chuk","value":3,"desc":"Won Premiere Night Comp"},{"houseguest":"Rome","value":3,"desc":"Won Premiere Night Comp"},{"houseguest":"Jason","value":3,"desc":"Won Premiere Night Comp"},{"houseguest":"Barrett","value":-3,"desc":"Not Included in Safety Comp"},{"houseguest":"Ashley","value":-3,"desc":"Not Included in Safety Comp"}],"leagues":[{"league":"BBoos & Luci","season":"28","alliances":[{"alliance":"Kerry's Alliance","owner":"Kerry","houseguests":["Haley","Taylor","Angela","Melody","Kamu"]},{"alliance":"Charles' Alliance","owner":"Charles","houseguests":["Dee","Rick","Ashley","Yash","Lyric"]},{"alliance":"Gerard's Alliance","owner":"Gerard","houseguests":["Mallory","Barrett","Jason","Drew","Latrice"]}]},{"league":"Biddie Poo Brother","season":"28","alliances":[{"alliance":"Ms Julie Stans","owner":"Gerard","houseguests":["Mallory","Barrett","Chuk","Melody","Drew"]},{"alliance":"Rachel Reilly's BFF","owner":"Jackie","houseguests":["Taylor","Jason","Kamu","Ashley","Yash"]},{"alliance":"DanGheeslingSuperFan","owner":"Hope","houseguests":["Dee","Latrice","Haley","Rome","Lyric"]}]},{"league":"Boof Brother","season":"28","alliances":[{"alliance":"Super Mega Bussin","owner":"Drew","houseguests":["Dee","Melody","Jason","Angela"]},{"alliance":"HICU Nurses","owner":"Caylee","houseguests":["Chuk","Rick","Haley","Kamu"]},{"alliance":"Bevo Brigade","owner":"Gerard","houseguests":["Mallory","Barrett","Drew","Yash"]},{"alliance":"BBattalion","owner":"Jess","houseguests":["Taylor","Latrice","Ashley","Rome"]}]},{"league":"The Pentagon","season":"28","alliances":[]},{"league":"Max and Gerard","season":"28","alliances":[{"alliance":"Gerard's Alliance","owner":"Gerard","houseguests":["Mallory","Jason","Dee","Melody","Rick","Yash","Taylor","Rome"]},{"alliance":"Max's Alliance","owner":"Max","houseguests":["Barrett","Lyric","Latrice","Ashley","Drew","Haley","Kamu","Chuk"]}]},{"league":"Ragan Fox's Fan Club","season":"28","alliances":[{"alliance":"Sana's Alliance","owner":"Sana","houseguests":["Rick","Lyric","Kamu","Rome","Haley"]},{"alliance":"Rachel's Alliance","owner":"Rachel","houseguests":["Latrice","Jason","Ashley","Angela","Taylor"]},{"alliance":"Gerard's Alliance","owner":"Gerard","houseguests":["Dee","Barrett","Mallory","Melody","Drew"]}]}]};

const view = document.getElementById('view');
const updatedEl = document.getElementById('updated');
let STATE = { leagues: [], points: [] };

function parseCSV(text){const rows=[];let row=[],field='',q=false;for(let i=0;i<text.length;i++){const c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else q=false;}else field+=c;}else{if(c==='"')q=true;else if(c===','){row.push(field);field='';}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else if(c==='\r'){}else field+=c;}}if(field.length||row.length){row.push(field);rows.push(row);}return rows;}
function headerIndex(h,names){const low=h.map(x=>x.trim().toLowerCase());for(const n of names){const i=low.indexOf(n.toLowerCase());if(i!==-1)return i;}return -1;}

async function load(){
  try{
    if(!CONFIG.POINTS_CSV||!CONFIG.LEAGUES_CSV){
      STATE.points=DEMO.points.slice();
      STATE.leagues=DEMO.leagues.map(l=>({...l,alliances:l.alliances.map(a=>({...a}))}));
      updatedEl.textContent='DEMO MODE · sample data from your six workbooks';
      renderLeaguePicker();return;
    }
    const [pt,lg]=await Promise.all([fetch(CONFIG.POINTS_CSV).then(r=>r.text()),fetch(CONFIG.LEAGUES_CSV).then(r=>r.text())]);
    STATE.points=readPoints(pt);STATE.leagues=readLeagues(lg);
    updatedEl.textContent='Updated '+new Date().toLocaleString();
    renderLeaguePicker();
  }catch(e){
    view.innerHTML=`<div class="err-box"><strong>Couldn't load the sheet.</strong><br>Check that both tabs are published to the web as CSV and the links in <code>CONFIG</code> are correct.<br><br><span style="color:#93342a99">${String(e)}</span></div>`;
  }
}
function findHeaderRow(rows,names){for(let i=0;i<Math.min(rows.length,5);i++){if(headerIndex(rows[i],names)!==-1)return i;}return 0;}
function readPoints(csv){const rows=parseCSV(csv).filter(r=>r.some(c=>c&&c.trim()));if(!rows.length)return[];const hr=findHeaderRow(rows,['Houseguest','HG','Name']);const h=rows[hr];const hi=headerIndex(h,['Houseguest','HG','Name']),vi=headerIndex(h,['Value','Points','Point Value']),di=headerIndex(h,['Description','Desc','Reason']);const out=[];for(let i=hr+1;i<rows.length;i++){const r=rows[i];const hg=(r[hi]||'').trim();const v=parseFloat(r[vi]);if(hg&&!isNaN(v))out.push({houseguest:hg,value:v,desc:di>=0?(r[di]||'').trim():''});}return out;}
function readLeagues(csv){const rows=parseCSV(csv).filter(r=>r.some(c=>c&&c.trim()));if(!rows.length)return[];const hr=findHeaderRow(rows,['League','League Name']);const h=rows[hr];const Li=headerIndex(h,['League','League Name']),Si=headerIndex(h,['Season','BB Season']),Ai=headerIndex(h,['Alliance','Team']),Oi=headerIndex(h,['Owner','Player','Manager']),Hi=headerIndex(h,['Houseguest','HG','Name']);const map={};for(let i=hr+1;i<rows.length;i++){const r=rows[i];const league=(r[Li]||'').trim();if(!league)continue;const season=Si>=0?(r[Si]||'').trim():'';const alliance=(r[Ai]||'').trim();const owner=Oi>=0?(r[Oi]||'').trim():'';const hg=(r[Hi]||'').trim();if(!map[league])map[league]={league,season,alliances:{}};if(!map[league].season&&season)map[league].season=season;if(!alliance)continue;if(!map[league].alliances[alliance])map[league].alliances[alliance]={alliance,owner,houseguests:[]};if(owner&&!map[league].alliances[alliance].owner)map[league].alliances[alliance].owner=owner;if(hg)map[league].alliances[alliance].houseguests.push(hg);}return Object.values(map).map(l=>({league:l.league,season:l.season,alliances:Object.values(l.alliances)}));}

function houseguestTotals(){const t={};for(const p of STATE.points){const k=p.houseguest.trim().toLowerCase();t[k]=(t[k]||0)+p.value;}return t;}
function scoreLeague(league){const totals=houseguestTotals();return league.alliances.map(a=>{const hgs=a.houseguests.map(name=>({name,points:totals[name.trim().toLowerCase()]||0})).sort((x,y)=>y.points-x.points);return {alliance:a.alliance,owner:a.owner,total:hgs.reduce((s,h)=>s+h.points,0),hgs};}).sort((x,y)=>y.total-x.total);}

function fmt(n){return (n>0?'+':'')+n;}
function ptsClass(n){return n>0?'pos-pts':(n<0?'neg-pts':'zero-pts');}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderLeaguePicker(){
  if(!STATE.leagues.length){view.innerHTML=`<div class="state"><div class="big">No leagues yet</div>Add rows to your Leagues tab and publish it.</div>`;return;}
  if(STATE.leagues.length===1){renderStandings(STATE.leagues[0]);return;}
  const cards=STATE.leagues.map((l,i)=>{const pending=l.alliances.length===0;return `<button class="league-card ${pending?'pending':''}" onclick="renderStandings(STATE.leagues[${i}])"><div class="season">Season ${escapeHtml(l.season||'—')}</div><div class="lname">${escapeHtml(l.league)}</div><div class="meta">${pending?'Draft in progress':l.alliances.length+' alliances'}</div></button>`;}).join('');
  view.innerHTML=`<div class="picker-label">Choose your league</div><div class="leagues">${cards}</div>`;
}
function renderStandings(league){
  const rows=scoreLeague(league);const multi=STATE.leagues.length>1;let html='';
  if(multi)html+=`<button class="back" onclick="renderLeaguePicker()">← All leagues</button>`;
  html+=`<div class="lead"><h2>${escapeHtml(league.league)}</h2><span class="season">BB${escapeHtml(league.season||'')}</span></div>`;
  if(!rows.length){html+=`<div class="subline">This league hasn't finished drafting yet.</div><div class="pending-note">Standings appear here once the draft is done and rosters are added to the Leagues tab.</div>`;view.innerHTML=html;return;}
  html+=`<div class="subline">Standings update automatically as the season sheet is filled in.</div>`;
  rows.forEach((r,idx)=>{const hgList=r.hgs.map(h=>`<div class="hg-row"><span>${escapeHtml(h.name)}</span><span class="v ${ptsClass(h.points)}">${fmt(h.points)}</span></div>`).join('');html+=`<div class="rank ${idx===0?'first':''}" id="rank_${idx}"><div class="pos">${idx+1}</div><div class="who"><div class="aname">${escapeHtml(r.alliance)}</div><div class="owner">${escapeHtml(r.owner||'—')}</div></div><div class="score"><div class="pts ${ptsClass(r.total)}">${fmt(r.total)}</div><div class="lbl">points</div></div><div class="expand-hint" onclick="toggleRank(${idx})">▾ show houseguests</div><div class="toggle-hg">${hgList}</div></div>`;});
  view.innerHTML=html;
}
function toggleRank(idx){const el=document.getElementById('rank_'+idx);el.classList.toggle('open');const hint=el.querySelector('.expand-hint');hint.textContent=el.classList.contains('open')?'▴ hide houseguests':'▾ show houseguests';}

window.renderStandings=renderStandings;window.renderLeaguePicker=renderLeaguePicker;window.toggleRank=toggleRank;window.STATE=STATE;
load();
</script>
</body>
</html>
